# S1: No-RAG variant — LLM reasoning without retrieval augmentation

variant: "S1"
description: "Baseline system without RAG. LLM reasons from perception + telemetry only."

rag:
  enabled: false

constraints:
  enabled: false

agents:
  vision: true
  telemetry: true
  evidence: false
  contradiction: false
  causation: true
  report: true
